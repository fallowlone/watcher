services:
  watcher:
    build: .
    restart: unless-stopped
    environment:
      VT_API_KEY: ${VT_API_KEY}
      WATCH_PATH: /watch
      QUARANTINE_PATH: /quarantine
      DATABASE_PATH: /data/jobs.sqlite
      HTTP_PORT: ${HTTP_PORT:-3847}
      HTTP_HOST: ${HTTP_HOST:-0.0.0.0}
    ports:
      - "127.0.0.1:${HTTP_PORT:-3847}:${HTTP_PORT:-3847}"
    volumes:
      - ${HOST_WATCH_DIR:-./watch}:/watch
      - ${HOST_QUARANTINE_DIR:-./quarantine}:/quarantine
      - ${HOST_DATA_DIR:-./data}:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    user: "1000:1000"
